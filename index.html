<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Tip calculator app</title>
    <script
      src="https://kit.fontawesome.com/d0b14c9d9b.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="sanitize.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="app">
      <header>
        <img src="images/logo.svg" alt="main-logo" />
      </header>
      <section class="container">
        <div class="calc-container">
          <div class="input-group">
            <div class="bill-input-container">
              <label for="bill-input" class="bill-text">Bill</label>
              <input id="bill-input" type="text" />
            </div>
            <div class="tip-selection-container">
              <div class="tip-header">
                <label for="tip-label" class="tip-label">Select Tip %</label>
                <button class="tip-option-button">Add tip option</button>
              </div>
              <!-- <div><p>Add tip option</p></div> -->
              <div class="tip-button-container">
                <div class="tip-buttons">
                  <button class="tip-button">5%</button>
                  <button class="delete-button">
                    <i class="fa-solid fa-xmark"></i>
                  </button>
                </div>
                <div class="tip-buttons">
                  <button class="tip-button">10%</button>
                  <button class="delete-button">
                    <i class="fa-solid fa-xmark"></i>
                  </button>
                </div>
                <div class="tip-buttons">
                  <button class="tip-button">15%</button>
                  <button class="delete-button">
                    <i class="fa-solid fa-xmark"></i>
                  </button>
                </div>
                <div class="tip-buttons">
                  <button class="tip-button">20%</button>
                  <button class="delete-button">
                    <i class="fa-solid fa-xmark"></i>
                  </button>
                </div>
                <div class="tip-buttons">
                  <button class="tip-button">25%</button>
                  <button class="delete-button">
                    <i class="fa-solid fa-xmark"></i>
                  </button>
                </div>
                <div class="tip-buttons">
                  <button class="tip-button">30%</button>
                  <button class="delete-button">
                    <i class="fa-solid fa-xmark"></i>
                  </button>
                </div>
              </div>
            </div>
            <div class="division-container">
              <label for="people">Number of People</label>
              <input id="people-input" type="number" />
            </div>
          </div>
          <div class="output-group">
            <div class="tip-amount-output">
              <div class="tip-amount-detail-container">
                <div class="tip-amount-detail-header">
                  <h2>Top Amount</h2>
                  <p>/ person</p>
                </div>
                <h2 class="price">$4.27</h2>
              </div>
              <div class="tip-amount-detail-container">
                <div class="tip-amount-detail-header">
                  <h2>Total</h2>
                  <p>/ person</p>
                </div>
                <h2 class="price">$32.79</h2>
              </div>
            </div>
            <button @click="submit" class="reset-button">RESET</button>
          </div>
        </div>
      </section>
    </main>
    <script
      type="module"
      integrity="sha512-74Oq+ChuT5U/qOSemS46nm9isaLNggZ78Wvdv3SmGOIs2s0Uph/3NW0wSn3Nl8PW1TzCVhx4nkfPr8bhy1ew/g=="
      crossorigin="anonymous"
    >
      import { createApp } from 'https://cdnjs.cloudflare.com/ajax/libs/vue/3.2.47/vue.esm-browser.prod.min.js';
      createApp({
        data() {
          return { msg: 'Hi' };
        },
        methods: {
          submit: function (e) {
            e.preventDefault();
            console.log(e);
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
